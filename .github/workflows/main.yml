name: Deploy to Azure VM

on:
  push:
    branches:
      - main   # or your main branch
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add VM to known_hosts
        run: |
            if [ -z "${{ secrets.AZURE_HOST }}" ]; then
              echo "AZURE_HOST secret is not set!" >&2
              exit 1
            fi
            echo "Testing connection to ${{ secrets.AZURE_HOST }}..."
            nc -zv ${{ secrets.AZURE_HOST }} 22 || echo "Port 22 not reachable"
            echo "Scanning SSH host keys..."
            ssh-keyscan -H ${{ secrets.AZURE_HOST }} 2>&1 >> ~/.ssh/known_hosts
            if [ $? -ne 0 ]; then
              echo "ssh-keyscan failed!" >&2
              exit 1
            fi
            echo "SSH host keys added successfully"

      - name: Deploy to Azure VM over SSH
        run: |
          ssh -i ~/.ssh/id_rsa -l "${{ secrets.AZURE_USER }}" "${{ secrets.AZURE_HOST }}" "
              git config --global url.'https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com/'.insteadOf 'https://github.com/'
              cd ~/steam-portfolio &&
              git fetch --all &&
              git reset --hard origin/main &&
              docker build -t steam-portfolio:latest . &&
              docker rm -f steam-portfolio || true &&
              docker run -d -p 8080:8080 \
                --name steam-portfolio \
                -e ASPNETCORE_ENVIRONMENT=Production \
                -e ASPNETCORE_URLS=http://+:8080 \
                -e ConnectionStrings__DefaultConnection='${{ secrets.CONNECTION_STRING }}' \
                steam-portfolio:latest
            "
