name: Deploy to Azure VM

on:
  push:
    branches:
      - main   # or your main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.AZURE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Azure VM over SSH
        run: |
          ssh -l ~/.ssh/id_rsa "${{ secrets.AZURE_USER }}" "${{ secrets.AZURE_HOST }}" "
            cd ~/steam-portfolio &&
            git fetch --all &&
            git reset --hard origin/main &&
            docker build -t steam-portfolio:latest . &&
            docker stop steam-portfolio || true &&
            docker rm steam-portfolio || true &&
            docker run -d -p 8080:8080 --name steam-portfolio steam-portfolio:latest
          "
